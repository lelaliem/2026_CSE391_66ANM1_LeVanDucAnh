
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form đặt hàng</title>

<style>

body{
    font-family: Arial;
    padding:20px;
}

form{
    width:400px;
}

label{
    display:block;
    margin-top:10px;
}

input,select,textarea{
    width:100%;
    padding:6px;
    margin-top:4px;
}

button{
    margin-top:10px;
    padding:8px 12px;
}

.error{
    color:red;
    font-size:13px;
}

#noteCount{
    font-size:12px;
    text-align:right;
}

#confirmBox{
    border:1px solid #ccc;
    padding:15px;
    margin-top:20px;
    display:none;
}

.success{
    color:green;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>Form đặt hàng</h2>

<form id="orderForm">

<label>Tên sản phẩm</label>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="ao">Áo</option>
<option value="quan">Quần</option>
<option value="giay">Giày</option>
</select>
<div class="error" id="productError"></div>


<label>Số lượng</label>
<input type="number" id="quantity">
<div class="error" id="quantityError"></div>


<label>Ngày giao hàng</label>
<input type="date" id="deliveryDate">
<div class="error" id="dateError"></div>


<label>Địa chỉ giao</label>
<input type="text" id="address">
<div class="error" id="addressError"></div>


<label>Ghi chú</label>
<textarea id="note"></textarea>
<div id="noteCount">0/200</div>
<div class="error" id="noteError"></div>


<label>Phương thức thanh toán</label>
<input type="radio" name="payment" value="cod"> COD
<input type="radio" name="payment" value="bank"> Chuyển khoản
<input type="radio" name="payment" value="wallet"> Ví điện tử
<div class="error" id="paymentError"></div>


<p>Tổng tiền: <span id="total">0</span> VND</p>

<button type="submit">Đặt hàng</button>

</form>


<div id="confirmBox">
<p id="summary"></p>
<button id="confirmBtn">Xác nhận</button>
<button id="cancelBtn">Hủy</button>
</div>


<script>

const form=document.getElementById("orderForm")

const product=document.getElementById("product")
const quantity=document.getElementById("quantity")
const deliveryDate=document.getElementById("deliveryDate")
const address=document.getElementById("address")
const note=document.getElementById("note")

const total=document.getElementById("total")

const noteCount=document.getElementById("noteCount")

const confirmBox=document.getElementById("confirmBox")
const summary=document.getElementById("summary")

const confirmBtn=document.getElementById("confirmBtn")
const cancelBtn=document.getElementById("cancelBtn")


const prices={
 ao:150000,
 quan:200000,
 giay:500000
}



function showError(field,message){
 document.getElementById(field+"Error").textContent=message
}

function clearError(field){
 document.getElementById(field+"Error").textContent=""
}



function validateProduct(){

 if(product.value===""){
  showError("product","Hãy chọn sản phẩm")
  return false
 }

 clearError("product")
 return true
}



function validateQuantity(){

 const value=parseInt(quantity.value)

 if(isNaN(value) || value<1 || value>99){
  showError("quantity","Số lượng từ 1 đến 99")
  return false
 }

 clearError("quantity")
 return true
}



function validateDate(){

 if(!deliveryDate.value){
  showError("date","Hãy chọn ngày giao")
  return false
 }

 const today=new Date()
 const selected=new Date(deliveryDate.value)

 const diff=(selected-today)/(1000*60*60*24)

 if(diff<0){
  showError("date","Không chọn ngày quá khứ")
  return false
 }

 if(diff>30){
  showError("date","Không quá 30 ngày")
  return false
 }

 clearError("date")
 return true
}



function validateAddress(){

 if(address.value.trim().length<10){
  showError("address","Địa chỉ tối thiểu 10 ký tự")
  return false
 }

 clearError("address")
 return true
}



function validateNote(){

 if(note.value.length>200){
  showError("note","Không quá 200 ký tự")
  return false
 }

 clearError("note")
 return true
}



function validatePayment(){

 const checked=document.querySelector("input[name='payment']:checked")

 if(!checked){
  showError("payment","Chọn phương thức thanh toán")
  return false
 }

 clearError("payment")
 return true
}



note.addEventListener("input",()=>{

 const length=note.value.length

 noteCount.textContent=length+"/200"

 if(length>200){
  noteCount.style.color="red"
 }else{
  noteCount.style.color="black"
 }

})



function calculateTotal(){

 const p=product.value
 const q=parseInt(quantity.value)

 if(!p || !q) return

 const totalPrice=prices[p]*q

 total.textContent=Number(totalPrice).toLocaleString("vi-VN")

}

product.addEventListener("change",calculateTotal)
quantity.addEventListener("input",calculateTotal)



product.addEventListener("blur",validateProduct)
quantity.addEventListener("blur",validateQuantity)
deliveryDate.addEventListener("blur",validateDate)
address.addEventListener("blur",validateAddress)
note.addEventListener("blur",validateNote)



product.addEventListener("input",()=>clearError("product"))
quantity.addEventListener("input",()=>clearError("quantity"))
deliveryDate.addEventListener("input",()=>clearError("date"))
address.addEventListener("input",()=>clearError("address"))
note.addEventListener("input",()=>clearError("note"))



form.addEventListener("submit",(e)=>{

 e.preventDefault()

 const valid=
  validateProduct() &
  validateQuantity() &
  validateDate() &
  validateAddress() &
  validateNote() &
  validatePayment()

 if(valid){

  summary.innerHTML=
  `
  Sản phẩm: ${product.options[product.selectedIndex].text}<br>
  Số lượng: ${quantity.value}<br>
  Tổng tiền: ${total.textContent} VND<br>
  Ngày giao: ${deliveryDate.value}
  `

  confirmBox.style.display="block"
 }

})



confirmBtn.addEventListener("click",()=>{

 form.style.display="none"

 confirmBox.innerHTML="<p class='success'>Đặt hàng thành công 🎉</p>"

})



cancelBtn.addEventListener("click",()=>{

 confirmBox.style.display="none"

})

</script>

</body>
</html>
