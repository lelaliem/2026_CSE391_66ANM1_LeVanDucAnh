<!-- file: register.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form đăng ký</title>

<style>
body{font-family:Arial;padding:30px}

form{
 width:350px;
}

input{
 width:100%;
 padding:6px;
 margin-top:4px;
}

label{
 font-weight:bold;
}

.error{
 color:red;
 font-size:13px;
}

.success{
 font-size:22px;
 color:green;
}

.field{
 margin-bottom:15px;
}
</style>

</head>

<body>

<h2>Đăng ký</h2>

<form id="registerForm">

<div class="field">
<label>Họ và tên</label>
<input id="fullname">
<small id="fullnameError" class="error"></small>
</div>

<div class="field">
<label>Email</label>
<input id="email">
<small id="emailError" class="error"></small>
</div>

<div class="field">
<label>Số điện thoại</label>
<input id="phone">
<small id="phoneError" class="error"></small>
</div>

<div class="field">
<label>Mật khẩu</label>
<input type="password" id="password">
<small id="passwordError" class="error"></small>
</div>

<div class="field">
<label>Xác nhận mật khẩu</label>
<input type="password" id="confirmPassword">
<small id="confirmPasswordError" class="error"></small>
</div>

<div class="field">
<label>Giới tính</label><br>
<input type="radio" name="gender" value="male"> Nam
<input type="radio" name="gender" value="female"> Nữ
<br>
<small id="genderError" class="error"></small>
</div>

<div class="field">
<input type="checkbox" id="terms">
Tôi đồng ý điều khoản
<br>
<small id="termsError" class="error"></small>
</div>

<button type="submit">Đăng ký</button>

</form>

<div id="successMessage"></div>

<script>

const form=document.getElementById("registerForm")

const fullname=document.getElementById("fullname")
const email=document.getElementById("email")
const phone=document.getElementById("phone")
const password=document.getElementById("password")
const confirmPassword=document.getElementById("confirmPassword")
const terms=document.getElementById("terms")

const successMessage=document.getElementById("successMessage")

function showError(id,message){
 document.getElementById(id+"Error").textContent=message
}

function clearError(id){
 document.getElementById(id+"Error").textContent=""
}

function validateFullname(){

 const value=fullname.value.trim()

 const regex=/^[A-Za-zÀ-ỹ\s]{3,}$/

 if(!value){
  showError("fullname","Không được để trống")
  return false
 }

 if(!regex.test(value)){
  showError("fullname","Ít nhất 3 ký tự, chỉ chữ cái")
  return false
 }

 clearError("fullname")
 return true
}

function validateEmail(){

 const value=email.value.trim()

 const regex=/^\S+@\S+\.\S+$/

 if(!value){
  showError("email","Email không được trống")
  return false
 }

 if(!regex.test(value)){
  showError("email","Email không hợp lệ")
  return false
 }

 clearError("email")
 return true
}

function validatePhone(){

 const value=phone.value.trim()

 const regex=/^0\d{9}$/

 if(!regex.test(value)){
  showError("phone","SĐT phải 10 số bắt đầu bằng 0")
  return false
 }

 clearError("phone")
 return true
}

function validatePassword(){

 const value=password.value

 const regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

 if(!regex.test(value)){
  showError("password","≥8 ký tự, có hoa thường và số")
  return false
 }

 clearError("password")
 return true
}

function validateConfirmPassword(){

 if(confirmPassword.value!==password.value){
  showError("confirmPassword","Mật khẩu không khớp")
  return false
 }

 clearError("confirmPassword")
 return true
}

function validateGender(){

 const gender=document.querySelector('input[name="gender"]:checked')

 if(!gender){
  showError("gender","Chọn giới tính")
  return false
 }

 clearError("gender")
 return true
}

function validateTerms(){

 if(!terms.checked){
  showError("terms","Phải đồng ý điều khoản")
  return false
 }

 clearError("terms")
 return true
}

form.addEventListener("submit",(e)=>{

 e.preventDefault()

 const valid=
  validateFullname() &
  validateEmail() &
  validatePhone() &
  validatePassword() &
  validateConfirmPassword() &
  validateGender() &
  validateTerms()

 if(valid){

  form.style.display="none"

  successMessage.innerHTML=
   `<p class="success">
     Đăng ký thành công! 🎉<br>
     Chào ${fullname.value}
    </p>`
 }
})

fullname.addEventListener("blur",validateFullname)
email.addEventListener("blur",validateEmail)
phone.addEventListener("blur",validatePhone)
password.addEventListener("blur",validatePassword)
confirmPassword.addEventListener("blur",validateConfirmPassword)

fullname.addEventListener("input",()=>clearError("fullname"))
email.addEventListener("input",()=>clearError("email"))
phone.addEventListener("input",()=>clearError("phone"))
password.addEventListener("input",()=>clearError("password"))
confirmPassword.addEventListener("input",()=>clearError("confirmPassword"))

</script>

</body>
</html>
